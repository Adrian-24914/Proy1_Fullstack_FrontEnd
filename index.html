<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Series Tracker - Cyberpunk Edition</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=VT323&display=swap" rel="stylesheet">
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- HEADER -->
  <header class="header">
    <div class="container">
      <div class="header-content">
        <div class="logo">SERIES_TRACKER//2077</div>
        <div class="header-actions">
          <button class="btn btn-secondary" id="exportCsvBtn">📥 Exportar CSV</button>
          <button class="btn btn-primary" id="newSeriesBtn">+ Nueva Serie</button>
        </div>
      </div>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="container">
    <!-- SEARCH SECTION -->
    <section class="search-section">
      <div class="search-bar">
        <input 
          type="text" 
          class="search-input" 
          id="searchInput" 
          placeholder="Buscar series..."
        >
        <select class="search-input" id="genreFilter" style="flex: 0 0 220px;">
          <option value="">Todos los géneros</option>
          <option value="Crime">Crime</option>
          <option value="Sci-Fi">Sci-Fi</option>
          <option value="Drama">Drama</option>
          <option value="Comedy">Comedy</option>
          <option value="Fantasy">Fantasy</option>
          <option value="Action">Action</option>
          <option value="Thriller">Thriller</option>
          <option value="Horror">Horror</option>
        </select>
      </div>
    </section>

    <!-- SERIES GRID -->
    <section id="seriesContainer">
      <div class="loading">CARGANDO_DATOS...</div>
    </section>
  </main>

  <!-- MODAL PARA CREAR/EDITAR SERIE -->
  <div class="modal" id="seriesModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Nueva Serie</h2>
        <span class="close-btn" id="closeModal">&times;</span>
      </div>
      
      <form id="seriesForm">
        <input type="hidden" id="seriesId">

        <div class="form-group">
          <label class="form-label" for="title">Título</label>
          <input type="text" class="form-input" id="title" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="description">Descripción</label>
          <textarea class="form-textarea" id="description" required></textarea>
        </div>

        <div class="form-group">
          <label class="form-label" for="genre">Género</label>
          <select class="form-select" id="genre" required>
            <option value="">Selecciona un género</option>
            <option value="Crime">Crime</option>
            <option value="Sci-Fi">Sci-Fi</option>
            <option value="Drama">Drama</option>
            <option value="Comedy">Comedy</option>
            <option value="Fantasy">Fantasy</option>
            <option value="Action">Action</option>
            <option value="Thriller">Thriller</option>
            <option value="Horror">Horror</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="year">Año</label>
          <input type="number" class="form-input" id="year" min="1900" max="2100" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="rating">Rating (0-10)</label>
          <input type="number" class="form-input" id="rating" min="0" max="10" step="0.1" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="imageFile">Imagen (máx 1MB)</label>
          <div style="display: flex; gap: 0.5rem; align-items: center;">
            <input type="file" class="form-input" id="imageFile" accept="image/jpeg,image/jpg,image/png,image/gif,image/webp" required style="flex: 1;">
            <button type="button" class="btn btn-secondary btn-small" id="uploadImageBtn">📤 Subir</button>
          </div>
          <input type="hidden" id="image_url">
          <div id="uploadStatus" style="margin-top: 0.5rem; color: var(--colors-secondary--500); font-size: 0.9rem;"></div>
        </div>

        <div class="form-group">
          <label class="form-checkbox">
            <input type="checkbox" id="watched">
            <span class="form-label">¿Ya vista?</span>
          </label>
        </div>

        <div class="form-group" style="margin-top: 2rem;">
          <button type="submit" class="btn btn-primary" style="width: 100%;">
            Guarda
